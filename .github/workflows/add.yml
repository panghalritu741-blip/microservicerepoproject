name: Build and Push Docker Image to ACR

on:
  workflow_dispatch:

env:
  ACR_NAME: acrtodoappsiddharth1
  ACR_LOGIN_SERVER: acrtodoappsiddharth1.azurecr.io
  IMAGE_NAME: addtask

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      - name: Build Docker Image
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.run_number }} AddTaskTodoMicroservice-main .

      - name: Push Docker Image
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.run_number }}
